<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>#실시간</title>
    <style>
      :root {
        color: #0f172a;
        background: #f4f8ff;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
      }

      main {
        display: grid;
        width: min(320px, calc(100vw - 40px));
        gap: 12px;
        padding: 24px;
        background: #ffffff;
        border: 1px solid #d8e5f6;
        border-radius: 24px;
        box-shadow: 0 22px 60px rgba(37, 99, 235, 0.12);
      }

      strong {
        color: #1d4ed8;
        font-size: 24px;
      }

      p {
        margin: 0;
        color: #667085;
        font-size: 14px;
        line-height: 1.55;
      }
    </style>
  </head>
  <body>
    <main>
      <strong>#실시간</strong>
      <p>앱 하네스가 준비되었습니다.</p>
      <p>실제 앱 화면은 CAPACITOR_SERVER_URL로 연결된 웹 베타에서 로드됩니다.</p>
    </main>
  </body>
</html>
